version: 2
updates:
  - package-ecosystem: nix
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(flake)
    groups:
      flake-inputs:
        patterns: ['*']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ['*']

